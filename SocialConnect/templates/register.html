<!DOCTYPE html>
<html>
<head>
    <title>Register | SocialConnect</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f0f2f5;
        }

        .box{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:#1877f2;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#125ec9;
        }

        a{
            text-decoration:none;
            color:#1877f2;
        }

        p{
            text-align:center;
            margin-top:15px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Register</button>

</form>

<p>
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
